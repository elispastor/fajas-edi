<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Correcciones Fajas Edi</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    form { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    input, textarea, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; }
    button { background: #5d3a1a; color: white; padding: 15px; border: none; border-radius: 5px; width: 100%; font-size: 16px; }
  </style>
</head>
<body>
  <form name="correcciones" method="POST" data-netlify="true">
    <input type="hidden" name="form-name" value="correcciones">
    <h2>📝 Solicitar cambio en Fajas Edi</h2>
    
    <label>Nombre completo *</label>
    <input type="text" name="nombre" required>

    <label>WhatsApp *</label>
    <input type="tel" name="telefono" required>

    <label>Correo electrónico *</label>
    <input type="email" name="email" required>

    <label>Descripción del cambio *</label>
    <textarea name="descripcion" rows="4" required></textarea>

    <button type="submit">ENVIAR SOLICITUD</button>
  </form>
</body>
</html>
