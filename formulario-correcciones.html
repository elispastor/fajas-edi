<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Correcciones · Fajas Edi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Montserrat', sans-serif; background: #f3f4f6; }
  </style>
</head>
<body>
<div class="max-w-3xl mx-auto p-4">
  <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
    <div class="bg-gradient-to-r from-[#5d3a1a] to-[#7a4f2a] text-white p-6 text-center">
      <h1 class="text-3xl font-bold" style="color: #e3c9a0;">📋 FORMULARIO DE CORRECCIONES</h1>
    </div>
    <div class="p-6">
      
      <div class="bg-blue-50 p-4 mb-6 rounded-lg">
        <p class="text-blue-800">Diligencia y recibirás respuesta en máximo 24 horas.</p>
      </div>

      <form name="correcciones" method="POST" data-netlify="true" enctype="multipart/form-data">
        <input type="hidden" name="form-name" value="correcciones">
        
        <div class="mb-4">
          <label class="block font-semibold mb-2">Nombre completo*</label>
          <input type="text" name="nombre" required class="w-full px-4 py-3 border-2 rounded-xl">
        </div>

        <div class="mb-4">
          <label class="block font-semibold mb-2">WhatsApp*</label>
          <input type="tel" name="telefono" required class="w-full px-4 py-3 border-2 rounded-xl">
        </div>

        <div class="mb-4">
          <label class="block font-semibold mb-2">Correo electrónico*</label>
          <input type="email" name="email" required class="w-full px-4 py-3 border-2 rounded-xl">
        </div>

        <div class="mb-4">
          <label class="block font-semibold mb-2">Nombre del negocio*</label>
          <input type="text" name="negocio" required class="w-full px-4 py-3 border-2 rounded-xl" value="Fajas Edi">
        </div>

        <div class="mb-4">
          <label class="block font-semibold mb-2">URL de tu tarjeta digital</label>
          <input type="url" name="url_sitio" placeholder="https://fajasedi.netlify.app" class="w-full px-4 py-3 border-2 rounded-xl">
        </div>

        <div class="mb-4">
          <label class="block font-semibold mb-2">Tipo de cambio*</label>
          <select name="tipo_cambio" required class="w-full px-4 py-3 border-2 rounded-xl bg-white">
            <option value="" disabled selected>Selecciona</option>
            <option value="texto">📝 Cambiar texto</option>
            <option value="imagen">🖼️ Cambiar imagen</option>
            <option value="precio">💰 Actualizar precio</option>
            <option value="seccion">➕ Agregar sección</option>
            <option value="color">🎨 Cambiar color</option>
            <option value="otro">🔧 Otro</option>
          </select>
        </div>

        <div class="mb-4">
          <label class="block font-semibold mb-2">Describe el cambio*</label>
          <textarea name="descripcion" rows="4" required class="w-full px-4 py-3 border-2 rounded-xl"></textarea>
        </div>

        <div class="mb-6">
          <label class="block font-semibold mb-2">Adjunta imagen (opcional)</label>
          <input type="file" name="adjunto" accept="image/*,.pdf" class="w-full px-4 py-3 border-2 rounded-xl bg-white">
        </div>

        <button type="submit" class="w-full bg-[#5d3a1a] hover:bg-[#7a4f2a] text-white font-bold py-4 px-8 rounded-xl text-lg border-2 border-[#e3c9a0]">
          ENVIAR SOLICITUD
        </button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
